<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ブロック崩し</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #1a1a2e;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
        }
        #gameContainer {
            position: relative;
        }
        canvas {
            display: block;
            border: 2px solid #e94560;
            border-radius: 4px;
            background: #16213e;
        }
        #overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(22, 33, 62, 0.85);
            color: white;
            border-radius: 4px;
        }
        #overlay h1 {
            font-size: 36px;
            margin-bottom: 10px;
            color: #e94560;
        }
        #overlay p {
            font-size: 18px;
            margin-bottom: 20px;
            color: #eee;
        }
        #overlay .sub {
            font-size: 14px;
            color: #aaa;
        }
        #overlay.hidden { display: none; }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="game" width="640" height="480"></canvas>
        <div id="overlay">
            <h1>ブロック崩し</h1>
            <p id="overlayMsg">クリックでスタート</p>
            <p class="sub">マウスまたは←→キーで操作</p>
        </div>
    </div>

    <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const overlay = document.getElementById('overlay');
    const overlayMsg = document.getElementById('overlayMsg');

    // Game state
    let state = 'start'; // start, playing, gameover, clear
    let score = 0;
    let lives = 3;
    let level = 1;

    // Paddle
    const paddle = { w: 100, h: 14, x: 0, y: canvas.height - 30, speed: 7 };
    paddle.x = (canvas.width - paddle.w) / 2;

    // Ball
    const ball = { x: 0, y: 0, r: 7, dx: 4, dy: -4, speed: 4 };

    // Blocks
    const blockRows = 5;
    const blockCols = 10;
    const blockW = 56;
    const blockH = 20;
    const blockPad = 4;
    const blockOffsetX = (canvas.width - (blockCols * (blockW + blockPad) - blockPad)) / 2;
    const blockOffsetY = 50;
    let blocks = [];

    const rowColors = ['#e94560', '#f5a623', '#f7dc6f', '#2ecc71', '#3498db'];

    function initBlocks() {
        blocks = [];
        for (let r = 0; r < blockRows; r++) {
            for (let c = 0; c < blockCols; c++) {
                blocks.push({
                    x: blockOffsetX + c * (blockW + blockPad),
                    y: blockOffsetY + r * (blockH + blockPad),
                    w: blockW, h: blockH,
                    color: rowColors[r],
                    alive: true,
                    points: (blockRows - r) * 10
                });
            }
        }
    }

    function resetBall() {
        ball.x = canvas.width / 2;
        ball.y = canvas.height - 50;
        const angle = -Math.PI / 4 + Math.random() * (-Math.PI / 2);
        const spd = ball.speed + (level - 1) * 0.5;
        ball.dx = Math.cos(angle) * spd;
        ball.dy = Math.sin(angle) * spd;
        if (ball.dy > 0) ball.dy = -ball.dy;
    }

    function resetGame() {
        score = 0;
        lives = 3;
        level = 1;
        ball.speed = 4;
        paddle.x = (canvas.width - paddle.w) / 2;
        initBlocks();
        resetBall();
    }

    // Input
    const keys = {};
    let mouseX = canvas.width / 2;

    document.addEventListener('keydown', e => keys[e.key] = true);
    document.addEventListener('keyup', e => keys[e.key] = false);
    canvas.addEventListener('mousemove', e => {
        const rect = canvas.getBoundingClientRect();
        mouseX = e.clientX - rect.left;
    });

    document.addEventListener('click', () => {
        if (state !== 'playing') {
            if (state === 'gameover' || state === 'start') resetGame();
            if (state === 'clear') { level++; ball.speed += 0.5; initBlocks(); resetBall(); }
            state = 'playing';
            overlay.classList.add('hidden');
        }
    });

    // Particles
    let particles = [];
    function spawnParticles(x, y, color) {
        for (let i = 0; i < 8; i++) {
            particles.push({
                x, y,
                dx: (Math.random() - 0.5) * 6,
                dy: (Math.random() - 0.5) * 6,
                life: 30,
                color
            });
        }
    }

    function updateParticles() {
        for (let i = particles.length - 1; i >= 0; i--) {
            const p = particles[i];
            p.x += p.dx;
            p.y += p.dy;
            p.life--;
            if (p.life <= 0) particles.splice(i, 1);
        }
    }

    function drawParticles() {
        for (const p of particles) {
            ctx.globalAlpha = p.life / 30;
            ctx.fillStyle = p.color;
            ctx.fillRect(p.x - 2, p.y - 2, 4, 4);
        }
        ctx.globalAlpha = 1;
    }

    // Update
    function update() {
        if (state !== 'playing') return;

        // Paddle movement
        if (keys['ArrowLeft'] || keys['a']) paddle.x -= paddle.speed;
        if (keys['ArrowRight'] || keys['d']) paddle.x += paddle.speed;

        // Mouse
        paddle.x += (mouseX - paddle.x - paddle.w / 2) * 0.15;
        paddle.x = Math.max(0, Math.min(canvas.width - paddle.w, paddle.x));

        // Ball movement
        ball.x += ball.dx;
        ball.y += ball.dy;

        // Wall collision
        if (ball.x - ball.r <= 0 || ball.x + ball.r >= canvas.width) ball.dx = -ball.dx;
        if (ball.y - ball.r <= 0) ball.dy = -ball.dy;

        // Bottom - lose life
        if (ball.y + ball.r >= canvas.height) {
            lives--;
            if (lives <= 0) {
                state = 'gameover';
                overlayMsg.textContent = `ゲームオーバー！ スコア: ${score}`;
                overlay.classList.remove('hidden');
            } else {
                resetBall();
            }
            return;
        }

        // Paddle collision
        if (ball.dy > 0 &&
            ball.y + ball.r >= paddle.y &&
            ball.y + ball.r <= paddle.y + paddle.h + 4 &&
            ball.x >= paddle.x &&
            ball.x <= paddle.x + paddle.w) {
            const hit = (ball.x - paddle.x) / paddle.w;
            const angle = -Math.PI / 6 - hit * (Math.PI * 2 / 3);
            const spd = Math.sqrt(ball.dx * ball.dx + ball.dy * ball.dy);
            ball.dx = Math.cos(angle) * spd;
            ball.dy = Math.sin(angle) * spd;
            if (ball.dy > 0) ball.dy = -ball.dy;
        }

        // Block collision
        let aliveCount = 0;
        for (const b of blocks) {
            if (!b.alive) continue;
            aliveCount++;
            if (ball.x + ball.r > b.x && ball.x - ball.r < b.x + b.w &&
                ball.y + ball.r > b.y && ball.y - ball.r < b.y + b.h) {
                b.alive = false;
                aliveCount--;
                score += b.points;
                spawnParticles(b.x + b.w / 2, b.y + b.h / 2, b.color);

                // Determine bounce direction
                const overlapLeft = ball.x + ball.r - b.x;
                const overlapRight = b.x + b.w - (ball.x - ball.r);
                const overlapTop = ball.y + ball.r - b.y;
                const overlapBottom = b.y + b.h - (ball.y - ball.r);
                const minOverlap = Math.min(overlapLeft, overlapRight, overlapTop, overlapBottom);
                if (minOverlap === overlapLeft || minOverlap === overlapRight) ball.dx = -ball.dx;
                else ball.dy = -ball.dy;
                break;
            }
        }

        if (aliveCount === 0) {
            state = 'clear';
            overlayMsg.textContent = `レベル ${level} クリア！ スコア: ${score}`;
            overlay.classList.remove('hidden');
        }

        updateParticles();
    }

    // Draw
    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Blocks
        for (const b of blocks) {
            if (!b.alive) continue;
            ctx.fillStyle = b.color;
            ctx.beginPath();
            const r = 3;
            ctx.moveTo(b.x + r, b.y);
            ctx.lineTo(b.x + b.w - r, b.y);
            ctx.quadraticCurveTo(b.x + b.w, b.y, b.x + b.w, b.y + r);
            ctx.lineTo(b.x + b.w, b.y + b.h - r);
            ctx.quadraticCurveTo(b.x + b.w, b.y + b.h, b.x + b.w - r, b.y + b.h);
            ctx.lineTo(b.x + r, b.y + b.h);
            ctx.quadraticCurveTo(b.x, b.y + b.h, b.x, b.y + b.h - r);
            ctx.lineTo(b.x, b.y + r);
            ctx.quadraticCurveTo(b.x, b.y, b.x + r, b.y);
            ctx.fill();
        }

        // Paddle
        ctx.fillStyle = '#e94560';
        ctx.shadowColor = '#e94560';
        ctx.shadowBlur = 10;
        ctx.beginPath();
        const pr = 7;
        ctx.moveTo(paddle.x + pr, paddle.y);
        ctx.lineTo(paddle.x + paddle.w - pr, paddle.y);
        ctx.quadraticCurveTo(paddle.x + paddle.w, paddle.y, paddle.x + paddle.w, paddle.y + pr);
        ctx.lineTo(paddle.x + paddle.w, paddle.y + paddle.h - pr);
        ctx.quadraticCurveTo(paddle.x + paddle.w, paddle.y + paddle.h, paddle.x + paddle.w - pr, paddle.y + paddle.h);
        ctx.lineTo(paddle.x + pr, paddle.y + paddle.h);
        ctx.quadraticCurveTo(paddle.x, paddle.y + paddle.h, paddle.x, paddle.y + paddle.h - pr);
        ctx.lineTo(paddle.x, paddle.y + pr);
        ctx.quadraticCurveTo(paddle.x, paddle.y, paddle.x + pr, paddle.y);
        ctx.fill();
        ctx.shadowBlur = 0;

        // Ball
        ctx.fillStyle = '#fff';
        ctx.shadowColor = '#fff';
        ctx.shadowBlur = 12;
        ctx.beginPath();
        ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;

        // Particles
        drawParticles();

        // HUD
        ctx.fillStyle = '#fff';
        ctx.font = '16px "Segoe UI", sans-serif';
        ctx.textAlign = 'left';
        ctx.fillText(`スコア: ${score}`, 15, 25);
        ctx.textAlign = 'center';
        ctx.fillText(`レベル ${level}`, canvas.width / 2, 25);
        ctx.textAlign = 'right';
        // Lives as hearts
        let heartsText = '';
        for (let i = 0; i < lives; i++) heartsText += '\u2764 ';
        ctx.fillStyle = '#e94560';
        ctx.fillText(heartsText, canvas.width - 15, 25);
    }

    function gameLoop() {
        update();
        draw();
        requestAnimationFrame(gameLoop);
    }

    resetGame();
    gameLoop();
    </script>
</body>
</html>
