<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="家庭用備蓄品の在庫管理PWAアプリ">
  <meta name="theme-color" content="#5A6FA0">
  <title>備蓄品管理システム</title>

  <!-- PWA Manifest -->
  <link rel="manifest" href="./manifest.json">

  <!-- iOS用メタタグ -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="備蓄品管理">
  <link rel="apple-touch-icon" href="./icons/icon-192.png">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Noto+Sans+JP:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <!-- スタイルシート -->
  <link rel="stylesheet" href="./css/style.css">
</head>
<body>
  <!-- ヘッダー -->
  <header class="header">
    <button class="header__menu-btn" id="menuBtn" aria-label="メニューを開く">
      <span class="menu-icon"></span>
    </button>
    <h1 class="header__title">備蓄品管理</h1>
    <div class="header__spacer"></div>
  </header>

  <!-- サイドメニュー -->
  <aside class="side-menu" id="sideMenu">
    <div class="side-menu__overlay" id="menuOverlay"></div>
    <nav class="side-menu__content">
      <div class="side-menu__header">
        <h2 class="side-menu__title">メニュー</h2>
        <button class="side-menu__close" id="menuCloseBtn" aria-label="メニューを閉じる">×</button>
      </div>
      <ul class="side-menu__list">
        <li>
          <button class="side-menu__item" id="exportJsonBtn">
            <span class="side-menu__icon">📥</span>
            JSONエクスポート
          </button>
        </li>
        <li>
          <button class="side-menu__item" id="importJsonBtn">
            <span class="side-menu__icon">📤</span>
            JSONインポート
          </button>
        </li>
        <li>
          <button class="side-menu__item" id="exportCalendarBtn">
            <span class="side-menu__icon">📅</span>
            カレンダー連携
          </button>
        </li>
        <li>
          <button class="side-menu__item" id="notificationSettingsBtn">
            <span class="side-menu__icon">🔔</span>
            通知設定
          </button>
        </li>
        <li>
          <button class="side-menu__item" id="aboutBtn">
            <span class="side-menu__icon">ℹ️</span>
            アプリについて
          </button>
        </li>
      </ul>
    </nav>
  </aside>

  <!-- メインコンテンツ -->
  <main class="main">
    <!-- ホーム画面（ダッシュボード） -->
    <div class="screen screen--home" id="screenHome">
      <!-- ヘッダー -->
      <div class="screen-header screen-header--large">
        <div class="screen-header__content">
          <h1 class="screen-header__title">備蓄管理</h1>
          <p class="screen-header__subtitle" id="currentDate"></p>
        </div>
        <button class="btn-notification" id="notificationBellBtn" aria-label="通知">
          <div class="btn-notification__icon" id="iconBell"></div>
          <span class="btn-notification__badge" id="notificationBadge"></span>
        </button>
      </div>

      <div class="dashboard">
        <!-- ヒーローステータスカード -->
        <div class="hero-status" id="heroStatus">
          <div class="hero-status__main">
            <div class="hero-status__value" id="heroValue">0</div>
            <div class="hero-status__label">件 要対応</div>
          </div>
          <div class="hero-status__breakdown" id="heroBreakdown">
            期限切れ 0件 ・ 7日以内 0件 ・ 30日以内 0件
          </div>
          <div class="hero-status__bar" id="heroBar"></div>
        </div>

        <!-- カテゴリ別在庫 -->
        <div class="dashboard-section">
          <h2 class="dashboard-section__title">カテゴリ別在庫</h2>
          <div class="category-grid" id="categoryGrid"></div>
        </div>

        <!-- 期限が近い品目 -->
        <div class="dashboard-section">
          <h2 class="dashboard-section__title">期限が近い品目</h2>
          <div class="expiring-list" id="expiringList"></div>
        </div>

        <!-- クイックアクション -->
        <div class="quick-actions">
          <button class="quick-action quick-action--primary" id="quickAddBtn">
            <span class="quick-action__icon" id="iconQuickAdd"></span>
            <span class="quick-action__label">備蓄品を追加</span>
          </button>
          <button class="quick-action" id="quickCalendarBtn">
            <span class="quick-action__icon" id="iconQuickCal"></span>
            <span class="quick-action__label">カレンダー出力</span>
          </button>
        </div>
      </div>
    </div>

    <!-- 在庫一覧画面 -->
    <div class="screen screen--list" id="screenList" style="display: none;">
      <!-- ヘッダー -->
      <div class="screen-header screen-header--large">
        <div class="screen-header__content">
          <h1 class="screen-header__title">在庫一覧</h1>
          <p class="screen-header__subtitle" id="listSubtitle">0品目 · 期限が近い順</p>
        </div>
      </div>

      <!-- フィルタ・ソートバー -->
      <section class="filter-bar">
        <div class="filter-bar__group">
          <label for="categoryFilter" class="filter-bar__label">カテゴリ:</label>
          <select id="categoryFilter" class="filter-bar__select">
            <option value="all">すべて</option>
            <option value="食品">食品</option>
            <option value="飲料">飲料</option>
            <option value="医薬品">医薬品</option>
            <option value="日用品">日用品</option>
            <option value="その他">その他</option>
          </select>
        </div>
        <div class="filter-bar__group">
          <label for="sortBy" class="filter-bar__label">並び順:</label>
          <select id="sortBy" class="filter-bar__select">
            <option value="exp">賞味期限順</option>
            <option value="name">品名順</option>
            <option value="cat">カテゴリ順</option>
            <option value="createdAt">登録日順</option>
          </select>
        </div>
      </section>

      <!-- アイテムリスト -->
      <section class="item-list" id="itemList">
        <div class="empty-state" id="emptyState">
          <p class="empty-state__text">備蓄品が登録されていません</p>
          <p class="empty-state__hint">下部の + ボタンから追加できます</p>
        </div>
      </section>
    </div>
  </main>

  <!-- タブバーナビゲーション -->
  <nav class="tab-bar" id="tabBar">
    <button class="tab-bar__item" data-tab="home" aria-label="ホーム">
      <div class="tab-bar__icon" id="iconHome"></div>
      <span class="tab-bar__label">ホーム</span>
    </button>
    <button class="tab-bar__item" data-tab="list" aria-label="在庫">
      <div class="tab-bar__icon" id="iconList"></div>
      <span class="tab-bar__label">在庫</span>
    </button>
    <button class="tab-bar__item tab-bar__item--fab" id="addBtn" aria-label="追加">
      <div class="tab-bar__fab">
        <div class="tab-bar__fab-icon" id="iconPlus"></div>
      </div>
      <span class="tab-bar__label">追加</span>
    </button>
    <button class="tab-bar__item" data-tab="cal" aria-label="カレンダー">
      <div class="tab-bar__icon" id="iconCal"></div>
      <span class="tab-bar__label">カレンダー</span>
    </button>
    <button class="tab-bar__item" data-tab="set" aria-label="設定">
      <div class="tab-bar__icon" id="iconCog"></div>
      <span class="tab-bar__label">設定</span>
    </button>
  </nav>

  <!-- アイテム追加/編集モーダル -->
  <div class="modal" id="itemModal">
    <div class="modal__overlay"></div>
    <div class="modal__content">
      <div class="modal__header">
        <h2 class="modal__title" id="modalTitle">備蓄品を追加</h2>
        <button class="modal__close" id="modalCloseBtn" aria-label="閉じる">×</button>
      </div>
      <form class="form" id="itemForm">
        <div class="form__group">
          <label for="itemName" class="form__label">品名 *</label>
          <input type="text" id="itemName" class="form__input" required>
        </div>

        <div class="form__row">
          <div class="form__group">
            <label for="itemQuantity" class="form__label">数量 *</label>
            <input type="number" id="itemQuantity" class="form__input" min="0" step="1" required>
          </div>
          <div class="form__group">
            <label for="itemUnit" class="form__label">単位</label>
            <input type="text" id="itemUnit" class="form__input" placeholder="個" value="個">
          </div>
        </div>

        <div class="form__group">
          <label for="itemCategory" class="form__label">カテゴリ *</label>
          <select id="itemCategory" class="form__select" required>
            <option value="">選択してください</option>
            <option value="water">飲料水</option>
            <option value="food">食品</option>
            <option value="medical">医薬品</option>
            <option value="hygiene">衛生用品</option>
            <option value="battery">電池・燃料</option>
            <option value="other">その他</option>
          </select>
        </div>

        <div class="form__group">
          <label for="itemExpiryDate" class="form__label">賞味期限 *</label>
          <input type="date" id="itemExpiryDate" class="form__input" required>
        </div>

        <div class="form__group">
          <label for="itemLocation" class="form__label">保管場所</label>
          <input type="text" id="itemLocation" class="form__input" placeholder="例: キッチン棚、防災倉庫">
        </div>

        <div class="form__group">
          <label for="itemNotes" class="form__label">メモ</label>
          <textarea id="itemNotes" class="form__textarea" rows="3" placeholder="その他のメモ"></textarea>
        </div>

        <div class="form__actions">
          <button type="button" class="btn btn--secondary" id="formCancelBtn">キャンセル</button>
          <button type="submit" class="btn btn--primary" id="formSubmitBtn">保存</button>
        </div>
      </form>
    </div>
  </div>

  <!-- 数量調整モーダル -->
  <div class="modal" id="quantityModal">
    <div class="modal__overlay"></div>
    <div class="modal__content modal__content--small">
      <div class="modal__header">
        <h2 class="modal__title" id="quantityModalTitle">数量調整</h2>
        <button class="modal__close" id="quantityModalCloseBtn" aria-label="閉じる">×</button>
      </div>
      <div class="quantity-control">
        <div class="quantity-control__item" id="quantityItemName"></div>
        <div class="quantity-control__current">
          現在: <span id="currentQuantity">0</span><span id="currentUnit">個</span>
        </div>
        <div class="quantity-control__buttons">
          <button class="btn btn--quantity" id="decreaseBtn">-1</button>
          <button class="btn btn--quantity" id="decrease5Btn">-5</button>
          <button class="btn btn--quantity btn--success" id="increase5Btn">+5</button>
          <button class="btn btn--quantity btn--success" id="increaseBtn">+1</button>
        </div>
        <div class="quantity-control__actions">
          <button class="btn btn--secondary btn--full" id="quantityCloseBtn">閉じる</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 通知設定モーダル -->
  <div class="modal" id="notificationModal">
    <div class="modal__overlay"></div>
    <div class="modal__content modal__content--small">
      <div class="modal__header">
        <h2 class="modal__title">通知設定</h2>
        <button class="modal__close" id="notificationModalCloseBtn" aria-label="閉じる">×</button>
      </div>
      <div class="settings">
        <div class="settings__group">
          <label class="settings__label">
            <input type="checkbox" id="notificationEnabled" class="settings__checkbox">
            <span>通知を有効にする</span>
          </label>
          <p class="settings__hint">賞味期限が近づいたら通知します</p>
        </div>

        <div class="settings__group">
          <label for="warningDays" class="settings__label">警告日数</label>
          <input type="number" id="warningDays" class="settings__input" min="1" max="365" value="30">
          <p class="settings__hint">この日数以内の商品を警告表示します</p>
        </div>

        <div class="settings__group">
          <label for="dailyCheckTime" class="settings__label">定期チェック時刻</label>
          <input type="time" id="dailyCheckTime" class="settings__input" value="09:00">
          <p class="settings__hint">毎日この時刻に賞味期限をチェックします</p>
        </div>

        <div class="settings__actions">
          <button class="btn btn--secondary btn--full" id="testNotificationBtn">テスト通知</button>
          <button class="btn btn--primary btn--full" id="saveNotificationBtn">保存</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ファイル入力（非表示） -->
  <input type="file" id="fileInput" accept=".json" style="display: none;">

  <!-- スクリプト -->
  <script src="./js/utils.js"></script>
  <script src="./js/storage.js"></script>
  <script src="./js/icons.js"></script>
  <script src="./js/calendar.js"></script>
  <script src="./js/notification.js"></script>
  <script src="./js/dashboard.js"></script>
  <script src="./js/tab-bar.js"></script>
  <script src="./js/app.js"></script>

  <!-- Service Worker登録 -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./service-worker.js')
          .then(registration => {
            console.log('Service Worker registered:', registration);
          })
          .catch(error => {
            console.error('Service Worker registration failed:', error);
          });
      });
    }
  </script>
</body>
</html>
